# SplitSnap — stack local / producción MVP (MDD §7.1, §7.3)
# Solo MySQL:  docker compose up -d mysql
# Stack completo: docker compose up -d --build

name: splitsnap

services:
  mysql:
    image: mysql:8.0
    container_name: splitsnap-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-splitsnap}
      MYSQL_USER: ${MYSQL_USER:-splitsnap}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-splitsnap}
    volumes:
      # Persistencia MySQL — objetivo MDD 10Gi en despliegue K8s
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u${MYSQL_USER:-splitsnap}",
          "-p${MYSQL_PASSWORD:-splitsnap}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: splitsnap-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${MYSQL_USER:-splitsnap}:${MYSQL_PASSWORD:-splitsnap}@mysql:3306/${MYSQL_DATABASE:-splitsnap}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-5}
      CALC_TOTAL_VARIANCE_THRESHOLD: ${CALC_TOTAL_VARIANCE_THRESHOLD:-0.05}
      PIPELINE_MOCK: ${PIPELINE_MOCK:-true}
      STORAGE_DIR: /data/uploads
      # Fallback si no se usan secrets de Docker (desarrollo)
      OCR_SPACE_API_KEY: ${OCR_SPACE_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    secrets:
      - ocr_space_api_key
      - gemini_api_key
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: splitsnap-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  mysql_data:
    name: splitsnap_mysql_data
  uploads_data:
    name: splitsnap_uploads_data

secrets:
  ocr_space_api_key:
    file: ./secrets/ocr_space_api_key
  gemini_api_key:
    file: ./secrets/gemini_api_key
