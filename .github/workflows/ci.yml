name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck API
        run: npm run typecheck:api

      - name: Typecheck Web
        run: npm run typecheck:web

      - name: Test API
        run: npm run test:api
        env:
          DATABASE_URL: mysql://test:test@localhost:3306/test
          NODE_ENV: test
          PIPELINE_MOCK: "true"

      - name: Build API
        run: npm run build:api

      - name: Build Web
        run: npm run build:web

  docker-build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Docker secrets
        run: bash scripts/prepare-docker-secrets.sh

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t splitsnap-api:ci .

      - name: Build Web image
        run: docker build -f apps/web/Dockerfile -t splitsnap-web:ci .
